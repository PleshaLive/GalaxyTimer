<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление командами - Обновленный дизайн</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Специфичные стили для страницы команд, если нужны, но постараемся обойтись общими */
        .teams-page-container {
            max-width: 900px;
            margin: var(--spacing-xl) auto;
            padding: var(--spacing-lg);
            background-color: var(--color-surface);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
        }
        .teams-page-container h1 {
            text-align: center;
            margin-bottom: var(--spacing-lg);
            color: var(--color-primary);
        }
        #addTeamForm {
            display: flex;
            flex-wrap: wrap; /* Для адаптивности */
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-lg);
            background-color: var(--color-surface-secondary);
            border-radius: var(--border-radius-md);
        }
        #addTeamForm .header-input { /* Используем класс из общих стилей */
            flex-grow: 1;
            min-width: 200px; /* Минимальная ширина для полей */
        }
        #addTeamForm button { /* Используем стили для .app-button */
            white-space: nowrap;
            flex-shrink: 0; /* Чтобы кнопка не сжималась */
        }

        .table-wrapper { overflow-x: auto; } /* Для адаптивности таблицы */

        #teamsTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: var(--spacing-lg);
        }
        #teamsTable th, #teamsTable td {
            border: 1px solid var(--color-border);
            padding: var(--spacing-md);
            text-align: left;
            vertical-align: middle;
        }
        #teamsTable th {
            background-color: var(--color-surface-secondary);
            font-weight: var(--font-weight-semibold);
        }
        #teamsTable td input.edit-input {
            width: calc(100% - 10px); /* Немного отступа */
            padding: var(--spacing-sm);
            border-radius: var(--border-radius-sm);
            border: 1px solid var(--color-border);
            font-size: 0.9rem;
        }
        #teamsTable td input.edit-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        .actions-cell {
            white-space: nowrap; /* Чтобы кнопки не переносились */
        }
        .actions-cell .action-button + .action-button { /* Отступ между кнопками действий */
            margin-left: var(--spacing-sm);
        }
        .back-link {
            display: inline-block;
            margin-bottom: var(--spacing-xl);
            color: var(--color-primary);
            text-decoration: none;
            font-weight: var(--font-weight-semibold);
        }
        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            #addTeamForm {
                flex-direction: column;
            }
            #addTeamForm .header-input, #addTeamForm button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="teams-page-container">
        <a href="/" class="back-link">&larr; Назад к интерфейсу матчей</a>
        <h1>Управление командами</h1>

        <form id="addTeamForm">
            <input type="text" id="newTeamName" placeholder="Название команды" required class="header-input">
            <input type="text" id="newTeamLogo" placeholder="Имя файла лого (например, navi)" class="header-input">
            <button type="submit" class="app-button">Добавить команду</button>
        </form>

        <div class="table-wrapper">
            <table id="teamsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Лого (файл)</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" style="text-align:center; padding: var(--spacing-lg);">Загрузка команд...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/teams.js"></script>
</body>
</html>
