<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление командами - Чистый дизайн</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .teams-page-body {
            padding: var(--spacing-lg);
        }
        .teams-page-content {
            max-width: 900px;
            margin: 0 auto;
        }
        #addTeamForm {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-md);
            background-color: var(--color-surface-secondary);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--color-border);
        }
        #addTeamForm .header-input {
            flex-grow: 1;
            min-width: 200px;
        }
        #addTeamForm button {
            white-space: nowrap;
            flex-shrink: 0;
        }
        .table-wrapper { 
            overflow-x: auto; 
            background-color: var(--color-surface); 
            border-radius: var(--border-radius-lg); 
            border: 1px solid var(--color-border); 
            padding: var(--spacing-sm); 
            margin-top: var(--spacing-lg);
        }
        #teamsTable {
            width: 100%;
            border-collapse: collapse;
        }
        #teamsTable th, #teamsTable td {
            border-bottom: 1px solid var(--color-divider); /* Только нижняя граница для чистоты */
            padding: var(--spacing-md);
            text-align: left;
            vertical-align: middle;
        }
        #teamsTable th {
            background-color: var(--color-surface-secondary);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-secondary);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            border-bottom-width: 2px; /* Более жирная граница для заголовков */
             border-top: 1px solid var(--color-divider); /* И верхняя для консистентности */
        }
         #teamsTable tr:last-child td {
            border-bottom: none;
        }
        #teamsTable td input.edit-input {
            width: calc(100% - 10px);
            padding: var(--spacing-sm);
        }
        .actions-cell { white-space: nowrap; text-align: right; }
        .actions-cell .action-button + .action-button { margin-left: var(--spacing-sm); }
        .back-link-container { margin-bottom: var(--spacing-lg); }
        .back-link {
            display: inline-flex; /* Для выравнивания иконки и текста */
            align-items: center;
            gap: var(--spacing-xs);
            color: var(--color-primary);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
        }
        .back-link:hover { color: var(--color-primary-light); }

        @media (max-width: 600px) {
            #addTeamForm { flex-direction: column; }
            #addTeamForm .header-input, #addTeamForm button { width: 100%; }
            .teams-page-body { padding: var(--spacing-md); }
        }
    </style>
</head>
<body class="teams-page-body">
    <div class="teams-page-content card-style">
        <div class="back-link-container">
            <a href="/" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/>
                </svg>
                Назад к интерфейсу матчей
            </a>
        </div>
        <h1>Управление командами</h1>

        <form id="addTeamForm">
            <input type="text" id="newTeamName" placeholder="Название команды" required class="header-input">
            <input type="text" id="newTeamLogo" placeholder="Имя файла лого (например, navi)" class="header-input">
            <button type="submit" class="app-button primary">Добавить команду</button>
        </form>

        <div class="table-wrapper">
            <table id="teamsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Лого (файл)</th>
                        <th style="text-align: right;">Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" style="text-align:center; padding: var(--spacing-lg);">Загрузка команд...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/teams.js"></script>
</body>
</html>
```
