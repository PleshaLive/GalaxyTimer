<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление командами - Темный дизайн</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Специфичные стили для страницы команд, если нужны, но постараемся обойтись общими */
        .teams-page-container { /* Используем card-style для единообразия */
            max-width: 900px;
            margin: var(--spacing-xl) auto;
            /* padding, background-color, border-radius, box-shadow, border - уже из .card-style */
        }
        .teams-page-container h1 {
            text-align: center;
            margin-bottom: var(--spacing-lg);
            color: var(--color-primary); /* Или var(--color-text-primary) для менее яркого заголовка */
        }
        #addTeamForm {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            padding: var(--spacing-lg);
            background-color: var(--color-surface-secondary); /* Немного другой фон для формы */
            border-radius: var(--border-radius-md);
            border: 1px solid var(--color-border);
        }
        #addTeamForm .header-input {
            flex-grow: 1;
            min-width: 200px;
        }
        #addTeamForm button {
            white-space: nowrap;
            flex-shrink: 0;
        }

        .table-wrapper { overflow-x: auto; }

        #teamsTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: var(--spacing-lg);
        }
        #teamsTable th, #teamsTable td {
            border: 1px solid var(--color-border);
            padding: var(--spacing-md);
            text-align: left;
            vertical-align: middle;
        }
        #teamsTable th {
            background-color: var(--color-surface-secondary); /* Шапка таблицы */
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-primary);
        }
        #teamsTable td input.edit-input {
            width: calc(100% - 10px);
            padding: var(--spacing-sm);
            border-radius: var(--border-radius-sm);
            /* Стили для инпутов уже определены глобально */
        }

        .actions-cell {
            white-space: nowrap;
        }
        .actions-cell .action-button + .action-button {
            margin-left: var(--spacing-sm);
        }
        .back-link {
            display: inline-block;
            margin-bottom: var(--spacing-xl);
            color: var(--color-primary-light);
            text-decoration: none;
            font-weight: var(--font-weight-semibold);
        }
        .back-link:hover {
            text-decoration: underline;
            color: var(--color-primary);
        }

        @media (max-width: 600px) {
            #addTeamForm {
                flex-direction: column;
            }
            #addTeamForm .header-input, #addTeamForm button {
                width: 100%;
            }
        }
    </style>
</head>
<body class="card-style teams-page-container"> <div> <a href="/" class="back-link">&larr; Назад к интерфейсу матчей</a>
        <h1>Управление командами</h1>

        <form id="addTeamForm">
            <input type="text" id="newTeamName" placeholder="Название команды" required class="header-input">
            <input type="text" id="newTeamLogo" placeholder="Имя файла лого (например, navi)" class="header-input">
            <button type="submit" class="app-button">Добавить команду</button>
        </form>

        <div class="table-wrapper">
            <table id="teamsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Лого (файл)</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" style="text-align:center; padding: var(--spacing-lg);">Загрузка команд...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="js/teams.js"></script>
</body>
</html>
