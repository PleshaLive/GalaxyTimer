  <script>
    // --- Динамическое добавление классов статуса ---
    function updateStatusClassesForAll() {
      const statusSelects = document.querySelectorAll('.status-select');
      statusSelects.forEach(select => {
        const matchColumn = select.closest('.match-column');
        if (matchColumn) {
            matchColumn.classList.remove('status-upcom', 'status-live', 'status-finished');
            const selectedStatus = select.value.toLowerCase();
            if (selectedStatus) { // Добавляем класс только если статус выбран
                 matchColumn.classList.add(`status-${selectedStatus}`);
            }
            // Обновляем цвет фона селекта
            if (typeof updateStatusColor === 'function') { // Проверяем доступность функции из main.js/matches.js
                updateStatusColor(select);
            }
        }
      });
    }
    // Обновляем при изменении
    document.querySelectorAll('.status-select').forEach(select => {
        select.addEventListener('change', updateStatusClassesForAll);
    });
    // Вызываем при загрузке (после того как main.js загрузит данные)
    document.addEventListener('DOMContentLoaded', () => {
        // Небольшая задержка, чтобы дать время main.js загрузить данные и установить значения
        setTimeout(updateStatusClassesForAll, 600);
    });
    // --- Конец JS для классов статуса ---

    // --- JS для дат турнира ---
    function calculateTournamentDay() {
      const startDateInput = document.getElementById('tournamentStart');
      const endDateInput = document.getElementById('tournamentEnd');
      const displaySpan = document.getElementById('tournamentDayDisplay');

      function updateDay() {
        if (!startDateInput || !displaySpan) return; // Проверка наличия элементов

        const startStr = startDateInput.value;
        const endStr = endDateInput ? endDateInput.value : null; // Проверка endDateInput

        if (startStr) {
          try {
              const start = new Date(startStr);
              const end = endStr ? new Date(endStr) : null;
              const today = new Date();

              start.setHours(0, 0, 0, 0);
              today.setHours(0, 0, 0, 0);
              if (end) end.setHours(0, 0, 0, 0);

              if (today < start) {
                  displaySpan.textContent = 'Турнир не начался';
              } else if (end && today > end) {
                  displaySpan.textContent = 'Турнир завершен';
              } else {
                  const diffTime = Math.abs(today - start);
                  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
                  displaySpan.textContent = `День ${diffDays}`;
              }
          } catch (e) {
              console.error("Ошибка парсинга даты турнира:", e);
              displaySpan.textContent = ''; // Очистить в случае ошибки
          }
        } else {
          displaySpan.textContent = ''; // Очистить, если дата начала не введена
        }
      }

      if (startDateInput) startDateInput.addEventListener('change', updateDay);
      if (endDateInput) endDateInput.addEventListener('change', updateDay);
      // Первоначальный расчет вызывается из updateCustomFieldsUI в main.js
      // updateDay();
    }
    document.addEventListener('DOMContentLoaded', calculateTournamentDay);
    // --- Конец JS для дат турнира ---
  </script>
