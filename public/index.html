    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
       socket.on("jsonUpdate", data => {
        const jsonOutput = document.getElementById("jsonOutput");
        if (jsonOutput) {
          jsonOutput.textContent = JSON.stringify(data, null, 2);
        }
      });
      socket.on("pauseUpdate", (pauseData) => {
         const msgInput = document.getElementById('pauseMessageInput');
         const timeInput = document.getElementById('pauseTimeInput');
         if (pauseData) {
             if (msgInput && msgInput.value !== (pauseData.pause || "")) msgInput.value = pauseData.pause || "";
             if (timeInput && timeInput.value !== (pauseData.lastUpd || "")) timeInput.value = pauseData.lastUpd || "";
         } else {
             if (msgInput) msgInput.value = "";
             if (timeInput) timeInput.value = "";
         }
      });
    </script>

  <script>
      const toggleJsonBtn = document.getElementById('toggleJsonOutput');
      const jsonOutputDiv = document.getElementById('jsonOutput');
      if (toggleJsonBtn && jsonOutputDiv) {
          toggleJsonBtn.addEventListener('click', () => {
              if (jsonOutputDiv.style.display === 'none') {
                  jsonOutputDiv.style.display = 'block';
                  toggleJsonBtn.textContent = 'Скрыть JSON';
              } else {

                  toggleJsonBtn.textContent = 'Показать JSON';
