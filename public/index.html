<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Display System</title>
  <style>
    /* Стили для визуального отображения */
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
    .match { background: #fff; border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
    .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .match-title { font-weight: bold; font-size: 1.1em; }
    .match-status { font-size: 0.9em; padding: 2px 6px; border-radius: 4px; color: #fff; }
    /* Цветовые обозначения статуса */
    .status-UPCOM { background: #007bff; }    /* синий для UPCOM (предстоящий) */
    .status-LIVE { background: #28a745; }     /* зелёный для LIVE */
    .status-FINISHED { background: #6c757d; } /* серый для FINISHED */
    .teams, .maps-section, .vrs-section, .custom-section { margin-bottom: 8px; }
    .teams label, .maps-section label, .vrs-section label, .custom-section label { font-weight: bold; }
    .teams select, .maps-section input, .vrs-section input, .custom-field-name, .custom-field-value, .time-input {
      margin: 0 5px 5px 0;
    }
    .winner-btn { margin-left: 5px; cursor: pointer; }
    .winner-btn.active { font-weight: bold; color: #ffc107; } /* Подсветка кнопки победителя */
    .custom-field { display: flex; align-items: center; margin-bottom: 5px; }
    .custom-field input { margin-right: 5px; }
    .remove-btn { cursor: pointer; color: #d00; margin-left: 5px; }
    .add-btn { cursor: pointer; color: #007bff; text-decoration: underline; background: none; border: none; padding: 0; }
  </style>
</head>
<body>
  <h1>Match Display System</h1>
  <div id="matches-container"><!-- Контейнер матчей заполняется скриптом --></div>

  <!-- Подключаем Socket.IO клиентский скрипт -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Подключаем пользовательские скрипты -->
  <script src="js/matches.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
