  <script>
    // --- Socket.IO Listener ---
    const socket = io();
    socket.on("jsonUpdate", data => {
      const jsonOutput = document.getElementById("jsonOutput");
      if (jsonOutput) {
        jsonOutput.textContent = JSON.stringify(data, null, 2);
      }
    });

    // --- Winner Button Logic ---
    document.querySelectorAll('.teams-info').forEach(teamsInfo => {
        const buttons = teamsInfo.querySelectorAll('.winner-btn');
        buttons.forEach(button => {
            button.addEventListener('click', (e) => {
                e.preventDefault(); // Предотвращаем стандартное поведение кнопки
                const currentMatchColumn = button.closest('.match-column');
                const team = button.dataset.team;

                // Убираем класс selected у обеих кнопок в этой карточке
                currentMatchColumn.querySelectorAll('.winner-btn').forEach(btn => btn.classList.remove('winner-selected'));

                // Добавляем класс selected нажатой кнопке
                button.classList.add('winner-selected');

                // Обновляем data-атрибут победителя у родительской колонки
                if(currentMatchColumn) {
                    currentMatchColumn.dataset.winner = team;
                    console.log(`Match ${currentMatchColumn.dataset.match} Winner set to: ${team}`); // Debug log
                }
            });
        });
        // Инициализация подсветки кнопки при загрузке (если data-winner уже установлен)
        const initialWinner = teamsInfo.closest('.match-column')?.dataset.winner;
        if (initialWinner) {
             teamsInfo.querySelector(`.winner-btn[data-team="${initialWinner}"]`)?.classList.add('winner-selected');
        }
    });

    // --- Status Select Color Sync ---
    // Функция для установки цвета селекта статуса
    function setStatusColor(selectElement) {
        const selectedValue = selectElement.value;
        selectElement.dataset.status = selectedValue; // Обновляем data-атрибут
    }
    // Применяем при загрузке ко всем селектам статуса
    document.querySelectorAll('.status-select').forEach(select => {
        setStatusColor(select); // Устанавливаем начальный цвет/data-атрибут
        select.addEventListener('change', () => setStatusColor(select)); // Обновляем при изменении
    });

     // --- Team Select Color Sync for Veto Table ---
    function setVetoTeamColor(selectElement) {
        const selectedTeam = selectElement.value;
        selectElement.dataset.team = selectedTeam;
    }
     document.querySelectorAll('#vetoTable .veto-team').forEach(select => {
        setVetoTeamColor(select); // Устанавливаем начальный цвет/data-атрибут
        select.addEventListener('change', () => setVetoTeamColor(select)); // Обновляем при изменении
    });


  </script>
