  <script>
     // --- Дополнительный JS для динамического добавления классов статуса ---
     // (Это лучше делать в main.js, но для примера можно и здесь)
     function updateStatusClasses() {
        const statusSelects = document.querySelectorAll('.status-select');
        statusSelects.forEach(select => {
            const matchColumn = select.closest('.match-column');
            if (matchColumn) {
                 // Удаляем старые классы статусов
                 matchColumn.classList.remove('status-upcom', 'status-live', 'status-finished');
                 // Добавляем новый класс в зависимости от выбранного значения
                 const selectedStatus = select.value.toLowerCase();
                 matchColumn.classList.add(`status-${selectedStatus}`);
            }
            // Обновляем при изменении
            select.addEventListener('change', () => {
                 const matchColumnOnChange = select.closest('.match-column');
                 if (matchColumnOnChange) {
                     matchColumnOnChange.classList.remove('status-upcom', 'status-live', 'status-finished');
                     const newStatus = select.value.toLowerCase();
                     matchColumnOnChange.classList.add(`status-${newStatus}`);
                 }
            });
        });
     }
     // Вызываем функцию при загрузке страницы
     document.addEventListener('DOMContentLoaded', updateStatusClasses);
     // --- Конец дополнительного JS ---

     // --- JS для дат турнира (пример расчета дня) ---
     function calculateTournamentDay() {
       const startDateInput = document.getElementById('tournamentStart');
       const endDateInput = document.getElementById('tournamentEnd');
       const displaySpan = document.getElementById('tournamentDayDisplay');

       function updateDay() {
         const startStr = startDateInput.value;
         const endStr = endDateInput.value;
         if (startStr && displaySpan) {
           const start = new Date(startStr);
           const today = new Date();
           // Обнуляем время для корректного сравнения дат
           start.setHours(0, 0, 0, 0);
           today.setHours(0, 0, 0, 0);

           if (today >= start) {
             const diffTime = Math.abs(today - start);
             const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // +1 т.к. первый день это день 1
             displaySpan.textContent = `День ${diffDays}`;
           } else {
             displaySpan.textContent = 'Турнир не начался';
           }
         } else if (displaySpan) {
            displaySpan.textContent = '';
         }
       }

       startDateInput.addEventListener('change', updateDay);
       endDateInput.addEventListener('change', updateDay); // Хотя дата конца не влияет на номер дня, пересчитаем на всякий
       updateDay(); // Первоначальный расчет
     }
     document.addEventListener('DOMContentLoaded', calculateTournamentDay);
     // --- Конец JS для дат турнира ---
  </script>
