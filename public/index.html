      socket.on("jsonUpdate", data => {
        console.log("[SOCKET] Received jsonUpdate for debug display:", data);
        const jsonOutput = document.getElementById("jsonOutput");
        if (jsonOutput) {
          // Отображаем полученные данные в формате JSON с отступами
