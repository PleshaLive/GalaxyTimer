            <div class="map-row">

          <div class="maps">

      </div> <div class="next-row">
          </div>

      <div class="map-veto-block">
        <h1>MAP VETO</h1>
        <div class="map-veto-header">
          <label for="matchSelect">Выберите матч:</label>
          <select id="matchSelect">
            </select>
        </div>
        <div class="table-wrapper">
          <table id="vetoTable">
            <thead>
              <tr>
                <th>ACTION</th>
                <th>MAP NAME</th>
                <th>TEAM</th>
                <th>SIDE</th>
              </tr>
            </thead>
            <tbody>
              <tr data-index="1"><td><select class="veto-action"><option>BAN</option><option>PICK</option><option>DECIDER</option></select></td><td><select class="veto-map"><option>Inferno</option><option>Dust 2</option><option>Mirage</option></select></td><td><select class="veto-team"><option>TEAM1</option><option>TEAM2</option></select></td><td><select class="veto-side"><option>-</option><option>CT</option><option>T</option></select></td></tr>
               <tr data-index="7"><td><select class="veto-action"><option>DECIDER</option><option>BAN</option><option>PICK</option></select></td><td><select class="veto-map"><option>Mirage</option><option>Inferno</option><option>Dust 2</option></select></td><td><select class="veto-team"><option>TEAM1</option><option>TEAM2</option></select></td><td><select class="veto-side"><option>-</option><option>CT</option><option>T</option></select></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div> <div class="json-output" id="jsonOutput">
      </div>

  </div> <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.on("jsonUpdate", data => {
      const jsonOutput = document.getElementById("jsonOutput");
      if (jsonOutput) {
        jsonOutput.textContent = JSON.stringify(data, null, 2);
      }
    });
    // --- Дополнительный JS для подсветки кнопок победителя ---
    document.querySelectorAll('.teams-info').forEach(teamsInfo => {
        const buttons = teamsInfo.querySelectorAll('.winner-btn');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                // Убираем класс selected у обеих кнопок в этой группе
                buttons.forEach(btn => btn.classList.remove('winner-selected'));
                // Добавляем класс selected нажатой кнопке
                button.classList.add('winner-selected');
                // Обновляем data-атрибут родительского .match-column (опционально)
                const matchColumn = button.closest('.match-column');
                if(matchColumn) {
                    matchColumn.dataset.winner = button.dataset.team;
                }
            });
        });
    });
  </script>

  <script type="module" src="js/vrs.js"></script>
