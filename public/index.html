  <script>
    // --- Socket.IO Listener ---
    const socket = io();
    socket.on("jsonUpdate", data => {
      const jsonOutput = document.getElementById("jsonOutput");
      if (jsonOutput) {
        jsonOutput.textContent = JSON.stringify(data, null, 2);
      }
    });

    // --- Winner Button Logic (Adapted for original buttons) ---
    document.querySelectorAll('.match-column').forEach(matchColumn => {
        const winnerButtons = matchColumn.querySelectorAll('.winner-buttons .original-winner-btn');
        winnerButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                e.preventDefault();
                const team = button.dataset.team;

                // Снимаем выделение со всех кнопок в этой группе
                winnerButtons.forEach(btn => btn.classList.remove('winner-selected'));
                // Добавляем выделение нажатой кнопке
                button.classList.add('winner-selected');
                // Обновляем data-атрибут у родителя
                matchColumn.dataset.winner = team;
                console.log(`Match ${matchColumn.dataset.match} Winner set to: ${team}`);
            });
        });

        // Инициализация подсветки при загрузке
        const initialWinner = matchColumn.dataset.winner;
        if (initialWinner) {
             matchColumn.querySelector(`.winner-buttons .original-winner-btn[data-team="${initialWinner}"]`)?.classList.add('winner-selected');
        }
    });

    // --- Team Select Color Sync for Veto Table ---
    // Эта часть JS остается, т.к. стили для вето используют data-атрибут
    function setVetoTeamColor(selectElement) {
        const selectedTeam = selectElement.value;
        selectElement.dataset.team = selectedTeam; // Устанавливаем data-атрибут для CSS
    }
     document.querySelectorAll('#vetoTable .veto-team').forEach(select => {
        setVetoTeamColor(select); // Устанавливаем начальный цвет/data-атрибут
        select.addEventListener('change', () => setVetoTeamColor(select)); // Обновляем при изменении
    });

  </script>
